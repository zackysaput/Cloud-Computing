<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Mahasiswa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column; /* Mengatur agar elemen tersusun vertikal */
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        .card {
            background-color: white;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 300px;
        }
        h2 {
            color: #333;
            margin-bottom: 15px;
        }
        p {
            font-size: 18px;
            color: #555;
            margin: 8px 0;
        }
        .label {
            font-weight: bold;
            color: #2c3e50;
        }
        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>Cloud Computing</h1>

        <h2>Data Mahasiswa</h2>
        <hr>
        <p><span class="label">Nama:</span> Zacky Saputra</p>
